[project]
name = marketing_engine
version = 0.2.0
environment = development

[paths]
# Base directories
data_dir = data

# Specific data files
merch_catalog = data/merch_catalog.json
restock_output = data/restock_recommendations.json

[logging]
debug = true
log_level = INFO

[process]
# Business logic defaults
default_demand_increase = 0.20
safety_stock_mode = fixed
safety_stock_value = 10

[forecasting]
ma_window = 3
wma_weights = 1,2,3
es_alpha = 0.3
