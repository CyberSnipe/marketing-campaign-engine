[project]
name = Marketing Campaign Engine          # Project name
version = 0.1.0                           # Semantic version of the project
environment = development                 # Current environment (development/staging/production)

[paths]
data_dir = data/                                        # Base directory for all project data files
merch_catalog = data/merch_catalog.json                 # Path to merchandise catalog JSON
restock_output = data/restock_recommendations.json      # Path where restock recommendations will be written

[logging]
debug = true                              # Enable debug logging (true/false)

[process] 
default_demand_increase = 0.20            # Default percentage increase applied during marketing campaigns


